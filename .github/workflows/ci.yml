name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend (.NET 10)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore finsight-ai.sln

      - name: Build
        run: dotnet build finsight-ai.sln --no-restore --configuration Release

      - name: Test
        run: dotnet test finsight-ai.sln --no-build --configuration Release --verbosity normal

  frontend:
    name: Frontend (Angular 19)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps
        working-directory: client

      - name: Build
        run: npx ng build --configuration=production
        working-directory: client
