<div class="min-h-[85vh] flex items-center justify-center px-4">
  <div class="w-full max-w-sm">
    <div class="flex flex-col items-center mb-8">
      <div class="logo-mark icon-box w-11 h-11 rounded-2xl mb-4 text-lg font-bold text-white">▲</div>
      <h1 class="font-display text-xl font-bold text-white tracking-tight">Crear cuenta</h1>
      <p class="page-subtitle mt-1">Empezá a trackear tu portfolio argentino</p>
    </div>

    <div class="card">
      @if (error$ | async; as error) {
        <div class="error-banner mb-5">{{ error }}</div>
      }

      <form [formGroup]="form" (ngSubmit)="onSubmit()" class="space-y-4">
        <div>
          <label class="label">Email</label>
          <input type="email" formControlName="email" class="input" placeholder="tu@email.com" autocomplete="email" />
        </div>
        <div>
          <label class="label">Contraseña</label>
          <input
            type="password"
            formControlName="password"
            class="input"
            placeholder="Mínimo 6 caracteres"
            autocomplete="new-password"
          />
        </div>
        <div class="pt-1">
          <button
            type="submit"
            class="btn-primary w-full justify-center py-2.5"
            [disabled]="form.invalid || (loading$ | async)"
          >
            @if (loading$ | async) {
              <span class="animate-spin mr-2">↻</span> Creando cuenta...
            } @else {
              Crear cuenta
            }
          </button>
        </div>
      </form>
    </div>

    <p class="text-center text-slate-600 text-sm mt-5">
      ¿Ya tenés cuenta?
      <a routerLink="/auth/login" class="text-slate-400 hover:text-white transition-colors ml-1">Ingresá</a>
    </p>
  </div>
</div>
