<nav class="bg-slate-900 border-b border-slate-800 sticky top-0 z-50">
  <div class="max-w-7xl mx-auto px-4 flex items-center justify-between h-16">
    <a routerLink="/dashboard" class="flex flex-col leading-tight">
      <span class="flex items-center gap-2 text-xl font-bold text-white">
        <span class="text-blue-500">&#9650;</span>
        FinSight AI
      </span>
      <span class="text-[10px] text-slate-600 pl-7 tracking-wide"
        >by Patricio Carestia</span
      >
    </a>

    <div class="hidden md:flex items-center gap-6">
      <a
        routerLink="/dashboard"
        routerLinkActive="text-blue-400"
        class="text-slate-400 hover:text-white transition-colors text-sm font-medium"
      >
        Dashboard
      </a>
      @if (isAuthenticated$ | async) {
        <a
          routerLink="/portfolio"
          routerLinkActive="text-blue-400"
          class="text-slate-400 hover:text-white transition-colors text-sm font-medium"
        >
          Portfolio
        </a>
        <a
          routerLink="/analysis"
          routerLinkActive="text-blue-400"
          class="text-slate-400 hover:text-white transition-colors text-sm font-medium"
        >
          Análisis IA
        </a>
        <span class="text-slate-500 text-sm max-w-[10rem] truncate">{{
          email$ | async
        }}</span>
        <button
          (click)="onLogout()"
          class="text-slate-400 hover:text-red-400 transition-colors text-sm font-medium"
        >
          Salir
        </button>
      } @else {
        <a
          routerLink="/auth/login"
          class="text-slate-400 hover:text-white transition-colors text-sm font-medium"
        >
          Ingresar
        </a>
        <a routerLink="/auth/register" class="btn-primary text-sm"
          >Registrarse</a
        >
      }
    </div>

    <button
      class="md:hidden text-slate-400 hover:text-white p-2 text-xl"
      (click)="showMenu.set(!showMenu())"
    >
      {{ showMenu() ? "✕" : "☰" }}
    </button>
  </div>

  @if (showMenu()) {
    <div
      class="md:hidden border-t border-slate-800 bg-slate-900 px-4 py-3 space-y-3"
    >
      <a
        routerLink="/dashboard"
        routerLinkActive="text-blue-400"
        (click)="showMenu.set(false)"
        class="block text-slate-400 hover:text-white transition-colors text-sm font-medium"
      >
        Dashboard
      </a>
      @if (isAuthenticated$ | async) {
        <a
          routerLink="/portfolio"
          routerLinkActive="text-blue-400"
          (click)="showMenu.set(false)"
          class="block text-slate-400 hover:text-white transition-colors text-sm font-medium"
        >
          Portfolio
        </a>
        <a
          routerLink="/analysis"
          routerLinkActive="text-blue-400"
          (click)="showMenu.set(false)"
          class="block text-slate-400 hover:text-white transition-colors text-sm font-medium"
        >
          Análisis IA
        </a>
        <span class="block text-slate-500 text-sm truncate">{{
          email$ | async
        }}</span>
        <button
          (click)="onLogout()"
          class="block text-red-400 hover:text-red-300 transition-colors text-sm font-medium"
        >
          Salir
        </button>
      } @else {
        <a
          routerLink="/auth/login"
          (click)="showMenu.set(false)"
          class="block text-slate-400 hover:text-white transition-colors text-sm font-medium"
        >
          Ingresar
        </a>
        <a
          routerLink="/auth/register"
          (click)="showMenu.set(false)"
          class="block btn-primary text-sm"
        >
          Registrarse
        </a>
      }
    </div>
  }
</nav>
