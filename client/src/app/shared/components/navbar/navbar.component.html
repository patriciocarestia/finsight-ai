<nav class="navbar sticky top-0 z-50">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 flex items-center justify-between h-14">
    <a routerLink="/dashboard" class="flex items-center gap-2.5 shrink-0">
      <div
        class="navbar-logo-icon w-7 h-7 rounded-lg flex items-center justify-center shrink-0 text-white text-sm font-bold"
      >
        ▲
      </div>
      <span class="font-display font-semibold text-[15px] tracking-tight text-white">
        FinSight<span class="navbar-logo-ai"> AI</span>
      </span>
      <span class="text-[10px] text-slate-600 tracking-wide">by Patricio Carestia</span>
    </a>

    <!-- Desktop nav -->
    <div class="hidden md:flex items-center gap-0.5">
      <!-- Theme toggle -->
      <button
        class="p-2 rounded-lg text-slate-500 hover:text-white transition-colors text-sm mr-1"
        (click)="theme.toggle()"
        [title]="theme.isDark() ? 'Modo claro' : 'Modo oscuro'"
      >
        {{ theme.isDark() ? "☀" : "☾" }}
      </button>

      <a
        routerLink="/dashboard"
        routerLinkActive="nav-active"
        [routerLinkActiveOptions]="{ exact: false }"
        class="px-3 py-1.5 rounded-lg text-slate-500 hover:text-white transition-all duration-150 text-sm font-medium"
      >
        Dashboard
      </a>
      @if (isAuthenticated$ | async) {
        <a
          routerLink="/portfolio"
          routerLinkActive="nav-active"
          class="px-3 py-1.5 rounded-lg text-slate-500 hover:text-white transition-all duration-150 text-sm font-medium"
        >
          Portfolio
        </a>
        <a
          routerLink="/analysis"
          routerLinkActive="nav-active"
          class="px-3 py-1.5 rounded-lg text-slate-500 hover:text-white transition-all duration-150 text-sm font-medium"
        >
          Análisis IA
        </a>
        <div class="navbar-divider w-px h-4 mx-3"></div>
        <span class="text-xs text-slate-600 max-w-[9rem] truncate select-none">{{ email$ | async }}</span>
        <button
          (click)="onLogout()"
          class="ml-2 px-3 py-1.5 rounded-lg text-slate-500 hover:text-red-400 transition-all duration-150 text-sm font-medium"
        >
          Salir
        </button>
      } @else {
        <div class="navbar-divider w-px h-4 mx-3"></div>
        <a
          routerLink="/auth/login"
          class="px-3 py-1.5 rounded-lg text-slate-500 hover:text-white transition-all duration-150 text-sm font-medium"
        >
          Ingresar
        </a>
        <a routerLink="/auth/register" class="btn-primary text-sm ml-1 py-1.5 px-3">Registrarse</a>
      }
    </div>

    <!-- Theme toggle (mobile) -->
    <button
      class="md:hidden p-2 rounded-lg text-slate-500 hover:text-white transition-colors"
      (click)="theme.toggle()"
      [title]="theme.isDark() ? 'Modo claro' : 'Modo oscuro'"
    >
      {{ theme.isDark() ? "☀" : "☾" }}
    </button>

    <!-- Mobile hamburger -->
    <button
      class="md:hidden p-2 rounded-lg text-slate-500 hover:text-white transition-colors text-xl"
      (click)="showMenu.set(!showMenu())"
    >
      {{ showMenu() ? "✕" : "☰" }}
    </button>
  </div>

  <!-- Mobile menu -->
  @if (showMenu()) {
    <div class="md:hidden navbar-mobile-bg px-4 pb-4 pt-2 space-y-0.5">
      <a
        routerLink="/dashboard"
        routerLinkActive="nav-active"
        (click)="showMenu.set(false)"
        class="block px-3 py-2.5 rounded-xl text-slate-500 hover:text-white hover:bg-white/[0.04] transition-all text-sm font-medium"
      >
        Dashboard
      </a>
      @if (isAuthenticated$ | async) {
        <a
          routerLink="/portfolio"
          routerLinkActive="nav-active"
          (click)="showMenu.set(false)"
          class="block px-3 py-2.5 rounded-xl text-slate-500 hover:text-white hover:bg-white/[0.04] transition-all text-sm font-medium"
        >
          Portfolio
        </a>
        <a
          routerLink="/analysis"
          routerLinkActive="nav-active"
          (click)="showMenu.set(false)"
          class="block px-3 py-2.5 rounded-xl text-slate-500 hover:text-white hover:bg-white/[0.04] transition-all text-sm font-medium"
        >
          Análisis IA
        </a>
        <div class="navbar-mobile-separator pt-2 mt-2">
          <p class="text-xs text-slate-700 px-3 pb-1 truncate">
            {{ email$ | async }}
          </p>
          <button
            (click)="onLogout()"
            class="block w-full text-left px-3 py-2.5 rounded-xl text-red-500 hover:text-red-400 hover:bg-red-500/5 transition-all text-sm font-medium"
          >
            Salir
          </button>
        </div>
      } @else {
        <div class="navbar-mobile-separator pt-2 mt-2 space-y-1">
          <a
            routerLink="/auth/login"
            (click)="showMenu.set(false)"
            class="block px-3 py-2.5 rounded-xl text-slate-500 hover:text-white hover:bg-white/[0.04] transition-all text-sm font-medium"
          >
            Ingresar
          </a>
          <a routerLink="/auth/register" (click)="showMenu.set(false)" class="block btn-primary text-sm text-center">
            Registrarse
          </a>
        </div>
      }
    </div>
  }
</nav>
