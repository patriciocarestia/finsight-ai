<div class="card hover:border-slate-600 transition-colors">
  <div class="flex items-center justify-between mb-3">
    <span class="text-slate-400 text-sm font-medium uppercase tracking-wider">{{ label }}</span>
    <span class="text-xs px-2 py-1 rounded-full"
          [class]="change >= 0 ? 'bg-green-900/30 text-green-400' : 'bg-red-900/30 text-red-400'">
      {{ change >= 0 ? '+' : '' }}{{ change | number:'1.2-2' }}%
    </span>
  </div>
  <div class="text-2xl font-bold text-white">
    ${{ sell | number:'1.0-0' }}
  </div>
  <div class="flex items-center gap-4 mt-2 text-sm text-slate-500">
    <span>Compra: ${{ buy | number:'1.0-0' }}</span>
    <span>Venta: ${{ sell | number:'1.0-0' }}</span>
  </div>
</div>
