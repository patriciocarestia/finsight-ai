<div class="card">
  <div class="flex items-start justify-between mb-4">
    <span class="text-[11px] font-medium text-slate-600 uppercase tracking-widest">{{ label }}</span>
    <span class="badge" [class]="change >= 0 ? 'badge-gain' : 'badge-loss'">
      {{ change >= 0 ? "↑" : "↓" }}&nbsp;{{ (change < 0 ? -change : change) | number: "1.1-1" }}%
    </span>
  </div>

  <div class="font-display text-[1.6rem] font-bold text-white tracking-tight leading-none mb-3">
    ${{ sell | number: "1.0-0" }}
  </div>

  <div class="flex items-center gap-3 text-[11px] text-slate-600">
    <span
      >C&nbsp;<span class="text-slate-500">${{ buy | number: "1.0-0" }}</span></span
    >
    <span class="text-white/10">·</span>
    <span
      >V&nbsp;<span class="text-slate-500">${{ sell | number: "1.0-0" }}</span></span
    >
  </div>
</div>
